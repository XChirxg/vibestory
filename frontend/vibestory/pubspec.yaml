name: vibestory
description: VibeStory — voice to Ghibli story app
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependency_overrides:
  record_linux: ^1.3.0
  record_platform_interface: ^1.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  http_parser: ^4.0.2
  shared_preferences: ^2.2.3
  record: ^5.2.0
  audioplayers: ^6.0.0
  file_picker: ^8.0.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: assets/icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
